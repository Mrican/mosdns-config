log:
  level: error
  file: ./mosdns.log

plugins:
  - tag: hosts
    type: hosts
    args:
      files: ./rule/hosts.txt

  - tag: lazy_cache
    type: cache
    args:
      size: 1024
      lazy_cache_ttl: 86400

  - tag: geoip_cn
    type: ip_set
    args:
      files: ./rule/geoip_cn.txt

  - tag: gfw_ip
    type: ip_set
    args:
      files: ./rule/gfw_ip.txt

  - tag: geosite_cn
    type: domain_set
    args:
      files: ./rule/geosite_cn.txt

  - tag: geosite_no_cn
    type: domain_set
    args:
      files: ./rule/geosite_geolocation-!cn.txt

  - tag: category_ads_all
    type: domain_set
    args:
      files: ./rule/geosite_category-ads-all.txt

  - tag: win_spy
    type: domain_set
    args:
      files: ./rule/geosite_win-spy.txt

  - tag: win_update
    type: domain_set
    args:
      files: ./rule/geosite_win-update.txt

  - tag: win_extra
    type: domain_set
    args:
      files: ./rule/geosite_win-extra.txt

  - tag: local_ptr
    type: domain_set
    args:
      files: ./rule/local-ptr.txt

  - tag: ecs_hk
    type: ecs_handler
    args:
      forward: false
      preset: 203.142.100.0
      send: false
      mask4: 24
      mask6: 48

  - tag: rate_limit
    type: rate_limiter
    args:
      qps: 20
      burst: 40
      mask4: 32
      mask6: 48

 - tag: forward_local
    type: forward
    args:
      concurrent: 3
      upstreams:
          - addr: https://sm2.doh.pub/dns-query
            dial_addr: 106.55.91.174
          - addr: https://223.5.5.5/dns-query
          - addr: tcp://180.184.1.1
            enable_pipeline: true

  - tag: forward_remote
    type: forward
    args:
      concurrent: 3
      upstreams:
          - addr: https://146.112.41.2/dns-query
          - addr: tls://76.76.2.11
            enable_pipeline: true
          - addr: https://mosdns.apad.pro/api-query
            bootstrap: 119.29.29.29
          
  - tag: local_sequence
    type: sequence
    args:
      - exec: $forward_local
      - matches: "!resp_ip $geoip_cn"
        exec: prefer_ipv4
      - exec: $ecs_hk
      - exec: $forward_remote
      - matches: "resp_ip $gfw_ip"
        exec: drop_resp

  - tag: remote_sequence
    type: sequence
    args:
      - exec: prefer_ipv4
      - exec: $ecs_hk
      - exec: $forward_remote
      - matches: "resp_ip $gfw_ip"
        exec: drop_resp
      - matches: "resp_ip $geoip_cn"
        exec: $forward_local

  - tag: query_is_local_domain
    type: sequence
    args:
      - matches: qname $geosite_cn
        exec: $local_sequence

  - tag: query_is_no_local_domain
    type: sequence
    args:
      - matches: qname $geosite_no_cn
        exec: $remote_sequence

  - tag: has_wanted_ans_sequence
    type: sequence
    args:
      - matches: has_wanted_ans
        exec: accept

  - tag: main_sequence
    type: sequence
    args:
      - matches: "!$rate_limit"
        exec: reject 3       
      - exec: $hosts
      - exec: jump has_wanted_ans_sequence
      - matches: qtype 12 65 255
        exec: reject 0
      - matches: qname $win_spy $win_update $win_extra
        exec: reject 3
      - matches: qname $category_ads_all $local_ptr
        exec: reject 3
      - exec: $lazy_cache
      - exec: jump has_wanted_ans_sequence
      - exec: $query_is_local_domain
      - exec: jump has_wanted_ans_sequence
      - exec: $query_is_no_local_domain
      - exec: jump has_wanted_ans_sequence
      - exec: $remote_sequence

  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: "127.0.0.1:53"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: "127.0.0.1:53"
